server:
  port: 8081

spring:
  application:
    name: product-service
  config:
    import: optional:nacos:product-service.yaml?refresh=true
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        username: nacos
        password: nacos
        import-check:
          enabled: false
    sentinel:
      transport:
        dashboard: 127.0.0.1:8090
        port: 8720
      eager: true
      datasource:
        flow:
          nacos:
            server-addr: 127.0.0.1:8848
            username: nacos
            password: nacos
            data-id: sentinel-product-service-flow-rules.json
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: flow
        degrade:
          nacos:
            server-addr: 127.0.0.1:8848
            username: nacos
            password: nacos
            data-id: sentinel-product-service-degrade-rules.json
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: degrade
        param-flow:
          nacos:
            server-addr: 127.0.0.1:8848
            username: nacos
            password: nacos
            data-id: sentinel-product-service-param-flow-rules.json
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: param-flow

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,sentinel
  metrics:
    tags:
      application: ${spring.application.name}

dubbo:
  application:
    name: product-service
    logger: slf4j
  protocol:
    name: dubbo
    host: 127.0.0.1
    port: 20882
  registry:
    address: nacos://127.0.0.1:8848?username=nacos&password=nacos
    group: DUBBO_GROUP
    register-mode: instance
  scan:
    base-packages: com.demo.product.service.impl
